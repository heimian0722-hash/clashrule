payload:
  # --- 1. 亚马逊与 eBay 体系 (解决详情页图片裂开) ---
  - '+.amazon.com'
  - '+.amazon.ca'
  - '+.media-amazon.com'      # 必须：详情页图片加速
  - '+.ssl-images-amazon.com' # 必须：静态 CSS/JS 资源
  - '+.completion.amazon.com'
  - '+.amazon-adsystem.com'
  - '+.ext-amazon.com'
  - '+.ebay.com'
  - '+.ebaystatic.com'
  - '+.ebayimg.com'           # 必须：解决搜索页商品图红叉
  - '+.ebayrtm.com'

  # --- 2. 综合百货、超市与家居 (防 403 Forbidden) ---
  - '+.walmart.com'
  - '+.target.com'
  - '+.costco.com'
  - '+.samsclub.com'
  - '+.macys.com'
  - '+.nordstrom.com'
  - '+.kohls.com'
  - '+.jcpenney.com'
  - '+.homedepot.com'
  - '+.lowes.com'

  # --- 3. 电子数码与办公 (高砍单风险监控) ---
  - '+.apple.com'
  - '+.bestbuy.com'           # 重点：BestBuy 极看 IP 纯净度
  - '+.newegg.com'
  - '+.bhphotovideo.com'
  - '+.dell.com'
  - '+.hp.com'
  - '+.lenovo.com'
  - '+.samsung.com'

  # --- 4. 潮流、运动与美妆 (IP 归属地敏感) ---
  - '+.nike.com'
  - '+.adidas.com'
  - '+.lululemon.com'
  - '+.coach.com'
  - '+.coachoutlet.com'       # 重点：奥莱风控等级极高
  - '+.ralphlauren.com'
  - '+.supremenewyork.com'
  - '+.stockx.com'
  - '+.goat.com'
  - '+.sephora.com'
  - '+.ulta.com'
  - '+.esteelauder.com'
  - '+.clinique.com'

  # --- 5. 购物专属支付网关与位置风控 ---
  # 说明：此处保留非银行类的第三方支付验证
  - '+.stripe.com'
  - '+.adyen.com'
  - '+.checkout.com'
  - '+.radar.io'              # 关键：识别设备物理位置的反欺诈工具
  - '+.card.io'               # 信用卡扫描识别

  # --- 6. 返利、导购与折扣工具 (防止丢单) ---
  - '+.rakuten.com'
  - '+.topcashback.com'
  - '+.slickdeals.net'
  - '+.camelcamelcamel.com'
  - '+.honey.io'
  - '+.joinhoney.com'

  
