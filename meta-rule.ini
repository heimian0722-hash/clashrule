[custom]
; ==========================================================
; Openclash订阅转换模板-防DNS泄露，来源于usbog232制作，https://raw.githubusercontent.com/usbog232/clashmetadingyue/main/new-meta.ini
; 原方案 优化国内直连、广告过滤净化，新增美国银行、虚拟银行、WiFicalling。
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=剩余流量|到期时间|套餐过期|重置|官网|网站|网址|防失联|失联|官方|公告|通知|QQ群|TG群|tg群|客服|工单|订阅链接|失败|导航|Expire|Traffic|Reset|Remaining|Official|Website|备用|客户端|订阅|更新|重新|超时
; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================
; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,86400
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,86400

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,86400
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,86400
ruleset=🚀 手动选择,clash-classic:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/CN_Proxy_Domain.yaml,28800

; --- 广告、垃圾网站拦截 -----------
ruleset=🛑 净化拦截,https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/BANAD.list,28800
ruleset=🛑 净化拦截,https://cdn.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockclashlite.list,28800

; --- 2026直连补丁 ---
ruleset=DIRECT,clash-domain:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/CN_Direct_Domain2026.yaml,86400

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; --------- 核心应用 -----------
; --- 美国银行、虚拟、数字银行Bank ---
ruleset=🏦 USBank,clash-domain:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/BankUS_Domain.yaml,86400
ruleset=🏦 USBank,clash-domain:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/paypal-domain-set.yaml,86400
ruleset=🏦 USBank,clash-domain:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/VirtualFinance.yaml,86400

; --- 交易所 & Adobe（全部走 GEOSITE）---
ruleset=💰 币圈,[]GEOSITE,okx
ruleset=💰 币圈,[]GEOSITE,binance
ruleset=💰 币圈,[]GEOSITE,bybit
; ==========================================================
; --- 若使用上方geo没有匹配到可以用下方url来匹配，需先在上方删除该应用的ruleset ---
; --- ruleset=💰 币圈,clash-domain:https://xxx/okx.yaml,86400
; ==========================================================

; --- 📞 Wificalling --- 
ruleset=📞 Wificalling,https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/wificalling.list

ruleset=📦 Notion,[]GEOSITE,Notion
ruleset=📦 Notion,[]GEOIP,Notion,no-resolve

ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=📨 Telegram,[]GEOIP,telegram,no-resolve

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve

; --- 海外主流应用补充 ---
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=🎵 TikTok,[]GEOIP,tiktok,no-resolve
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter

; --- 开发 / 工具 ---
ruleset=🧑‍💻 GitHub,[]GEOSITE,github
ruleset=🧑‍💻 GitHub,[]GEOIP,github,no-resolve
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest
ruleset=🎮 Steam,[]GEOSITE,steam

; --- Adobe ---
ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 社交 / 通讯 ---
ruleset=📞 即时通讯,[]GEOSITE,category-communication
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn

; --- Google / Microsoft（新增） ---
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=☁️ cloudflare,[]GEOIP,cloudflare,no-resolve

ruleset=🔎 Google,[]GEOSITE,google
ruleset=🔎 Google,[]GEOIP,google,no-resolve

ruleset=🖥️ Microsoft,[]GEOSITE,microsoft
ruleset=🖥️ Microsoft,[]GEOIP,microsoft,no-resolve

; --- GFW 兜底 ---
ruleset=🚀 手动选择,[]GEOSITE,gfw

; --- 最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 默认分组
; ==========================================================
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`select`.*`https://www.gstatic.com/generate_204`300,,50

; ==========================================================
; 3) 净化拦截
; ==========================================================
custom_proxy_group=🛑 净化拦截`select`[]REJECT`[]DIRECT`[]🚀 手动选择`[]♻️ 自动选择

; ==========================================================
; 4) 全球直连 / 漏网之鱼
;    同时新增：🧊 冷门节点（只收非 HK/JP/TW/US/SG 的节点）
; ==========================================================
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 手动选择`[]♻️ 自动选择`[]🧊 冷门节点`.*

; ==========================================================
; 5) 应用分流策略组（UI 主入口，不越权）
;    说明：每个应用都加入「🧊 冷门节点」可选
; ==========================================================
custom_proxy_group=📞 Wificalling`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🍎 Apple`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🧠 AI`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=📨 Telegram`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=📞 即时通讯`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=💬 社交媒体`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🎬 YouTube`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🎥 Netflix`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🎵 TikTok`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=📸 Instagram`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🐦 X`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=📦 Notion`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🧑‍💻 GitHub`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🚝 测速工具`select`[]DIRECT`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🏦 USBank`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=💰 币圈`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT
; Adobe：允许一键禁止联网
custom_proxy_group=🟥 Adobe`select`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`[]REJECT
custom_proxy_group=🔎 Google`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=☁️ cloudflare`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`[]🚀 手动选择`[]♻️ 自动选择
; Microsoft：允许直连优先，同时也能选五区/冷门/Default
custom_proxy_group=🖥️ Microsoft`select`[]DIRECT`[]♻️ 自动选择`[]🚀 手动选择`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点

; ==========================================================
; 6) 国家节点、测速组（保持不动）
; ==========================================================
custom_proxy_group=🇺🇸 US`select`(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 JP`select`(?i)(🇯🇵|日本|\\bJP\\b|tokyo|osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 SG`select`(?i)(🇸🇬|新加坡|\\bSG\\b|singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 HK`select`(?i)(🇭🇰|香港|\\bHK\\b|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 TW`select`(?i)(🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet)`http://www.gstatic.com/generate_204`300,,50
; 冷门节点池（排除 HK/JP/TW/US/SG）——selector 手动选择
; 说明：用负向匹配把五大区节点剔除，剩余即“冷门”
custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(🇭🇰|香港|\\bHK\\b|hong\\s*kong|🇯🇵|日本|\\bJP\\b|tokyo|osaka|🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet|🇸🇬|新加坡|\\bSG\\b|singapore|🇺🇸|美国|\\bUS\\b|united\\s*states|los\\s*angeles|san\\s*jose|seattle|new\\s*york)).*
