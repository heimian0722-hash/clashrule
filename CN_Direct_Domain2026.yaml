payload:
    # ================= ⚠️ 重点补充：新兴 AI 大模型 (GEOSITE,cn 更新滞后区) =================
    # 月之暗面 (Kimi) - 极易被漏
    - '+.moonshot.cn'
    - '+.kimi.moonshot.cn'
    - '+.api.moonshot.cn'
    
    # 深度求索 (DeepSeek)
    - '+.deepseek.com'
    - '+.chat.deepseek.com'
    - '+.api.deepseek.com'
    
    # 字节豆包 (Doubao) - 独立域名易漏
    - '+.doubao.com'
    - '+.doubaochat.com'
    - '+.coze.cn'
    - '+.volces.com'              # 火山引擎底层
    
    # 阿里通义 (特定 API 入口)
    - '+.dashscope.aliyun.com'     # 灵积 API (根域名 aliyun.com 已在 GEOSITE,cn 中，但特定子域建议显式直连)
    - '+.tongyi.aliyun.com'
    - '+.wanxiang.aliyun.com'
    - '+.qianwen.com'

    # 腾讯混元/元宝
    - '+.hunyuan.tencent.com'
    - '+.yuanbao.tencent.com'
    
    # 智谱 AI
    - '+.open.bigmodel.cn'
    - '+.chatglm.cn'
    
    # 其他独角兽 (阶跃/MiniMax/零一万物/讯飞)
    - '+.stepfun.com'
    - '+.hailuoai.com'
    - '+.minimax.io'
    - '+.01.ai'
    - '+.xinghuo.xfyun.cn'
    - '+.metaso.cn'                # 秘塔 AI

    # ================= ⚠️ 重点补充：云厂商特定 API/CDN (防止误判) =================
    # 七牛云 (很多中小厂图片/视频存储，易漏)
    - '+.qiniucdn.com'
    - '+.qiniudn.com'
    
    # 又拍云
    - '+.upyun.com'
    
    # 华为云 API
    - '+.huaweicloudapis.com'
    
    # 京东云
    - '+.jcloudcs.com'

    # ================= ⚠️ 重点补充：米哈游 (精确修正) =================
    # 您的规则中有 category-games@cn，但米哈游的部分登录/更新域有时需显式指定
    # 确保不移除 hoyoverse (如果您玩国际服)，这里仅强制国内核心域直连
    - '+.miyoushe.com'             # 米游社
    - '+.bh3.com'
    # 注意：mihoyo.com 通常在 GEOSITE,cn 中，若发现异常可取消下面注释
    # - '+.mihoyo.com' 

    # ================= ⚠️ 重点补充：开发者与特定社区 =================
    # Gitee 的子域有时解析问题
    - '+.giteeusercontent.com'
    
    # 掘金/B 站特定 CDN (若视频加载慢可开启)
    - '+.juejin.im'
    - '+.hdslb.com'                # B 站老 CDN

    # ================= ⚠️ 重点补充：小红书/知乎 (特定静态资源) =================
    - '+.xhscdn.com'               # 小红书图片/视频 CDN
    - '+.zhimg.com'                # 知乎图片 CDN
