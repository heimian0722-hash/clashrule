#机场订阅
proxy-providers:
  PeiQian-Airport:
    url: https://dash.pqjc.site/api/v1/pq/52  #机场订阅地址
    interval: 86400

      
port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443

dns:
  enable: true
  prefer-h3: true
  default-nameserver:
    - 114.114.114.114
    - 119.29.29.29
  nameserver:
    - 114.114.114.114
    - 119.29.29.29
  fallback:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
  fake-ip-filter:
    [
      "*.n.n.srv.nintendo.net",
      +.stun.playstation.net,
      xbox.*.*.microsoft.com,
      "*.msftncsi.com",
      "*.msftconnecttest.com",
      WORKGROUP,
      "*.lan",
      stun.*.*,
      stun.*.*.*,
      +.stun.*.*,
      +.stun.*.*.*,
      +.stun.*.*.*.*,
      +.stun.*.*.*.*.*,
      time.windows.com,
      time.nist.gov,
      time.apple.com,
      time.asia.apple.com,
      "*.ntp.org.cn",
      "*.openwrt.pool.ntp.org",
      time1.cloud.tencent.com,
      time.ustc.edu.cn,
      pool.ntp.org,
      ntp.ubuntu.com,
      "*.*.xboxlive.com",
      speedtest.cros.wr.pvp.net,
    ]

proxy-groups:
  # 功能分组
    - name: 自动选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Auto.png
    interval: 120
    lazy: true
    tolerance: 50
    输入: url-test
    include-all: true

  - name: 手动选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Static.png
    interval: 120
    lazy: true
    tolerance: 50
    输入: select
    include-all: true
    
  - name: 选择代理
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png
    输入: select
    proxies:
      - 自动选择
      - 手动选择
      - DIRECT
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾
    include-all: true
      
  - name: 漏网之鱼
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Final.png
    输入: select
    proxies:
      - 选择代理
      - 手动选择
      - 自动选择
      - DIRECT
      
  - name: YouTube
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/YouTube.png
    输入: select
    proxies:
      - 自动选择
      - 手动选择
      - DIRECT
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾     

  - name: Netflix
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Netflix.png
    输入: select
    proxies:
      - 自动选择
      - 手动选择
      - DIRECT
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾

  - name: Disney+
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Disney%2B.png
    输入: select
    proxies:
      - 自动选择
      - 手动选择
      - DIRECT
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾

  - name: Spotify
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Spotify.png
    输入: select
    proxies:
      - 自动选择
      - 手动选择
      - DIRECT
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾

  - name: Speedtest
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Speedtest.png
    输入: select
    proxies:
      - 自动选择
      - 手动选择
      - DIRECT
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾

  # 基于地区分组
  - name: HK 香港
    filter: "澳门|🇲🇴|港|🇭🇰|HK|(?i)Hong"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
    interval: 120
    lazy: true
    tolerance: 50
    输入: select
    include-all: true
    
  - name: US 美国
    filter: "美|united states|los angeles|san jose|seattle|new york|🇺🇲|US|(?i)States|America"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png
    interval: 120
    lazy: true
    tolerance: 50
    输入: select
    include-all: true
    
  - name: JP 日本
    filter: "日|🇯🇵|东京|JP|(?i)Japan"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png
    interval: 120
    lazy: true
    tolerance: 50
    输入: select
    include-all: true

  - name: TW 台湾
    filter: "台|🇹🇼|湾|TW|(?i)Taiwan"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Taiwan.png
    interval: 120
    lazy: true
    tolerance: 50
    输入: select
    include-all: true

  - name: SG 新加坡
    filter: "新加坡|坡|狮城|🇸🇬|SG|(?i)Singapore"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png
    interval: 120
    lazy: true
    tolerance: 50
    输入: select
    include-all: true

rules:
  - SCRIPT,quic,REJECT
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - RULE-SET,Custom_Direct_Domain,DIRECT
  - RULE-SET,Custom_Direct_Classical_IP,DIRECT
