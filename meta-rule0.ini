[custom]
; Openclash订阅转换模板-防DNS泄露，来源于usbog232制作，https://raw.githubusercontent.com/usbog232/clashmetadingyue/main/new-meta.ini
; 原方案基础上 优化国内直连、广告过滤净化、筛选低倍率，新增美国银行、虚拟银行、WiFicalling；可以多个2-3个机场一起用，优质+大流量 配合使用，精准分流；

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
exclude_remarks=(流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|客户端|更新|重新|失败|超时|正在|Expire|Traffic|Reset|Remaining|Official|Website)

; ==========================================================
; 1) 规则（自上而下优先级）

; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- 广告、垃圾网站拦截 -----------
ruleset=🛑 净化拦截,https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/BANAD.list,86400
ruleset=🛑 净化拦截,https://cdn.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockclashlite.list,86400

; --- 原直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,86400
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,86400

; --- 强制直连补充 ---
ruleset=DIRECT,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/CN_Direct_Domain2026.yaml,28800

; --- 强制代理补充/图床归入社交媒体方便选择低倍率节点 ---
ruleset=💬 社交媒体,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/CN_Proxy_Domain_img.yaml,28800
ruleset=🌐 代理补充,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/CN_Proxy_Domain.yaml,28800

; --- 原代理补丁 ---
ruleset=🌐 代理补充,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,86400
ruleset=🌐 代理补充,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,86400

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; --------- 核心应用 -----------
; --- 美国银行、虚拟、数字银行Bank ---
ruleset=🏦 USBank,clash-domain:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/BankUS_Domain.yaml,28800
ruleset=🏦 USBank,clash-domain:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/paypal-domain-set.yaml,28800
ruleset=🏦 USBank,clash-domain:https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/VirtualFinance.yaml,28800

; --- 交易所 & Adobe（全部走 GEOSITE）---
ruleset=💰 币圈,[]GEOSITE,okx
ruleset=💰 币圈,[]GEOSITE,binance
ruleset=💰 币圈,[]GEOSITE,bybit
; --- 若使用上方geo没有匹配到可以用下方url来匹配，需先在上方删除该应用的ruleset ---
; --- ruleset=💰 币圈,clash-domain:https://xxx/okx.yaml,86400

; --- 📞 Wificalling --- 
ruleset=📞 Wificalling,https://cdn.jsdelivr.net/gh/heimian0722-hash/clashrule@main/wificalling.list

ruleset=📦 Notion,[]GEOSITE,Notion
ruleset=📦 Notion,[]GEOIP,Notion,no-resolve

ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=📨 Telegram,[]IP-CIDR,149.154.160.0/20,no-resolve
ruleset=📨 Telegram,[]IP-CIDR,91.108.4.0/22,no-resolve
ruleset=📨 Telegram,[]IP-CIDR,91.108.8.0/22,no-resolve
ruleset=📨 Telegram,[]IP-CIDR,91.108.12.0/22,no-resolve
ruleset=📨 Telegram,[]IP-CIDR,91.108.16.0/22,no-resolve
ruleset=📨 Telegram,[]IP-CIDR,91.108.56.0/22,no-resolve
ruleset=📨 Telegram,[]GEOIP,telegram,no-resolve

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve

; --- 海外主流应用补充 ---
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=🎵 TikTok,[]GEOIP,tiktok,no-resolve
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter

; --- 开发 / 工具 ---
ruleset=🧑‍💻 GitHub,[]GEOSITE,github
ruleset=🧑‍💻 GitHub,[]GEOIP,github,no-resolve
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest
ruleset=🎮 Steam,[]GEOSITE,steam

; --- Adobe ---
ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 社交 / 通讯 ---
ruleset=📞 即时通讯,[]GEOSITE,category-communication
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn

; --- Google / Microsoft（新增） ---
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=☁️ cloudflare,[]GEOIP,cloudflare,no-resolve

ruleset=🔎 Google,[]GEOSITE,google
ruleset=🔎 Google,[]GEOIP,google,no-resolve

ruleset=🖥️ Microsoft,[]GEOSITE,microsoft
ruleset=🖥️ Microsoft,[]GEOIP,microsoft,no-resolve

; --- GFW 兜底 ---
ruleset=🚀 手动选择,[]GEOSITE,gfw

; --- 最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 默认分组
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]📡 倍率节省`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`600,,50
custom_proxy_group=📡 倍率节省`select`(?i)(0.1x|0.01x|0.001x)

; ==========================================================
; 3) 净化拦截
custom_proxy_group=🛑 净化拦截`select`[]REJECT`[]DIRECT`[]🚀 手动选择`[]♻️ 自动选择`[]📡 倍率节省

; ==========================================================
; 4) 全球直连 / 漏网之鱼 同时新增：🧊 冷门节点（只收非 HK/JP/TW/US/SG 的节点）
custom_proxy_group=🌐 代理补充`select`[]DIRECT`[]🚀 手动选择`[]♻️ 自动选择`[]📡 倍率节省`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 手动选择`[]♻️ 自动选择`[]📡 倍率节省`[]🇺🇸 US`[]🇯🇵 JP`[]🇸🇬 SG`[]🇭🇰 HK`[]🇹🇼 TW`[]🧊 冷门节点`.*

