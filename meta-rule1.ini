[custom]
; Openclash订阅转换模板-防DNS泄露，来源于usbog232，https://raw.githubusercontent.com/usbog232/clashmetadingyue/main/new-meta.ini
; 原方案基础上 补充国内直连、补充国外代理、净化拦截反监控、筛选低倍率、美国银行、虚拟银行、币圈、WiFicalling、静态住宅ip中转；可以多个2-3个机场订阅一起用，优质+大流量 配合使用，精准分流；
; 使用meta-rule.ini，可以docker自建metacubex/subconverter订阅服务器，比api.wcc.best好用，方便快速更新；

; 允许生成规则
enable_rule_generator=true
; 覆盖原始规则
overwrite_original_rules=true
loglevel = Warning
; 开启订阅信息（如果你需要查看流量的话）
generate_info = true
; 节点清洗
exclude_remarks=(?i)(?:流量|套餐|到期|剩余|重置|官网|网站|域名|地址|机场|入口|节点|注意|维护|失联|公告|通知|电报|群|频道|说明|最新|客服|工单|订阅|更新|重新|失败|超时|正在|Expire|Traffic|Reset|Remaining|Official|Website|Telegram|TG|QQ)

; ==========================================================
; 1) 规则（自上而下优先级）
; 静态住宅中转
ruleset=🔗 住宅中转,clash-classic:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/StaticResidential.yaml,86400

; --- 📞 Wificalling (优先级最高) ---
custom_rules=- DST-PORT,500,📞 Wificalling
custom_rules=- DST-PORT,4500,📞 Wificalling
ruleset=📞 Wificalling,clash-classic:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/Wificalling.yaml,86400

; --- 净化拦截 (AD.FZ) ---
ruleset=🛑 净化拦截,clash-domain:https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockmihomolite.yaml,86400
ruleset=🛑 净化拦截,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/BANAD.yaml,86400
ruleset=🛑 净化拦截,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/CN_Reject_Domain.yaml,86400

; --- 基础直连 (私有网络与本地库) ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,[]GEOSITE,apple-cn,deepseek,feishu,category-ai-cn

; --- 直连补充 (远程维护列表) ---
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,86400
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,86400
ruleset=DIRECT,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/CN_Direct_Domain.yaml,86400

; --- 代理补充/图床归入社交媒体方便选择低倍率节点 ---
ruleset=💬 社交媒体,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/CN_Proxy_Domain_img.yaml,86400
ruleset=🌐 代理补充,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/CN_Proxy_Domain.yaml,86400

; --------- 核心应用 -----------
; --- 美国银行（购物）、香港银行、欧洲银行 ---
ruleset=🇺🇸 BankUS,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/BankUS_Domain.yaml,86400
ruleset=🇺🇸 BankUS,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/ShopUS.yaml,86400

ruleset=🇭🇰 BankHK,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/BankHK_Domain.yaml,86400
ruleset=🇪🇺 BankEU,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/BankEU_Domain.yaml,86400

; --- 币圈/交易所 ---
; A组：美国 Coinbase、Base、Kraken、Gemini等(建议固定美国节点)
; B组：国际离岸 币安、OKX、Bybit、Bitget、Gate及所有核心API与静态资源(建议走台湾/香港/新加坡节点)
ruleset=💰 币圈A,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/Crypto-A.yaml,86400
ruleset=💰 币圈B,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/Crypto-B.yaml,86400

; --- AI ---
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 AI,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/AI-Domain.yaml,86400
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🍎 Apple,[]GEOSITE,apple

; --- 社交 / 媒体 ---
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎵 TikTok,clash-domain:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/Bytedance.yaml,86400
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=🎵 TikTok,[]GEOIP,tiktok,no-resolve
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter
ruleset=📦 Notion,[]GEOSITE,Notion
ruleset=📦 Notion,[]GEOIP,Notion,no-resolve

; --- 社交 / 通讯 ---
ruleset=📨 Telegram,clash-classic:https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/Telegram.yaml,86400
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=📨 Telegram,[]GEOIP,telegram,no-resolve

ruleset=📞 即时通讯,[]GEOSITE,category-communication
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn

; --- Adobe ---
ruleset=🟥 Adobe,[]GEOSITE,adobe

; --- 开发 / 工具 ---
ruleset=🧑‍💻 GitHub,[]GEOSITE,github
ruleset=🧑‍💻 GitHub,[]GEOIP,github,no-resolve
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest
ruleset=🎮 Steam,[]GEOSITE,steam

; --- Cloudflare/Microsoft/Google ---
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=☁️ cloudflare,[]GEOIP,cloudflare,no-resolve

ruleset=🔎 Google,[]GEOSITE,google
ruleset=🔎 Google,[]GEOIP,google,no-resolve

ruleset=🖥️ Microsoft,[]GEOSITE,microsoft
ruleset=🖥️ Microsoft,[]GEOIP,microsoft,no-resolve

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; --- GFW 兜底 ---
ruleset=🌐 代理补充,[]GEOSITE,gfw

; --- 最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 默认分组
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]📡 倍率节省`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`600,,50
custom_proxy_group=📡 倍率节省`url-test`(?i)(0.1|0.01|0.5|0.001x)`https://cp.cloudflare.com/generate_204`600,,50
custom_proxy_group=🔗 住宅中转`select`[]🇭🇰 HK`[]🇸🇬 SG`[]🇺🇸 US`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`.*
; ==========================================================
; 3) 净化拦截
custom_proxy_group=🛑 净化拦截`select`[]REJECT`[]DIRECT`[]🚀 手动选择`[]♻️ 自动选择`[]📡 倍率节省

; ==========================================================
; 4) 全球直连 / 漏网之鱼 同时新增：🧊 冷门节点（只收非 HK/JP/TW/US/SG 的节点）
custom_proxy_group=🌐 代理补充`select`[]DIRECT`[]🚀 手动选择`[]♻️ 自动选择`[]📡 倍率节省`[]🇺🇸 US`[]🇭🇰 HK`[]🇸🇬 SG`[]🇹🇼 TW`[]🇯🇵 JP`[]🧊 冷门节点
