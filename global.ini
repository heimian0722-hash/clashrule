[custom]
; Openclash 订阅转换模板 - 彻底修复注入报错版
enable_rule_generator=true
overwrite_original_rules=true

; 1. 手动注入节点：建议先移除图标，用纯英文名测试以排除编码干扰
custom_proxy=NY-Static-Residential`socks5`你的IP`端口`账号`密码

; 2. 策略组重构
; --- 载体组 (用于筛选你的机场美国节点)
custom_proxy_group=📡 节点载体`select`(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)

; --- 核心链式代理 (关键修改点：确保名字与上方 custom_proxy 完全一致)
; 逻辑：流量 -> 📡 节点载体 -> NY-Static-Residential
custom_proxy_group=🔗 住宅中转`relay`[]📡 节点载体`[]NY-Static-Residential

; --- 最终分流出口
custom_proxy_group=🐟 漏网之鱼`select`[]🔗 住宅中转`[]🚀 手动选择

; --- 辅助备用组
custom_proxy_group=🚀 手动选择`select`[]📡 节点载体`[]🇭🇰 HK`[]🇸🇬 SG`.*

; 3. 规则部分
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL
