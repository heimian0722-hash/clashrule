[custom]
; Openclash 订阅转换模板 - 修复“not found”错误版
enable_rule_generator=true
overwrite_original_rules=true

; 1. 手动注入节点 (确保名字唯一且固定)
custom_proxy=🗽 静态住宅`socks5`你的IP`端口`账号`密码

; 2. 策略组重构
; --- 步骤 A: 载体组 (保持不变，用于筛选机场节点)
custom_proxy_group=📡 节点载体`select`(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)

; --- 步骤 B: 修正后的链式代理 (关键修改点)
; 注意：这里直接写注入的节点名 []🗽 静态住宅，不经过中间的筛选组
custom_proxy_group=🔗 住宅中转`relay`[]📡 节点载体`[]🗽 静态住宅

; --- 步骤 C: 最终分流出口
custom_proxy_group=🐟 漏网之鱼`select`[]🔗 住宅中转`[]🚀 手动选择

; --- 辅助备用组
custom_proxy_group=🚀 手动选择`select`[]📡 节点载体`[]🇭🇰 HK`[]🇸🇬 SG`.*

; 3. 规则部分 (除了内网，全量去纽约)
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL
