[custom]
; Openclash 订阅转换模板 - 静态链式代理
enable_rule_generator=true
overwrite_original_rules=true

; 手动注入静态住宅节点 (作为最终出口)
custom_proxy=🗽 静态住宅`socks5`你的IP`端口`账号`密码

custom_proxy_group=📡 中转载体`select`(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)
custom_proxy_group=🔗 住宅中转`relay`[]📡 中转载体`[]🗽 静态住宅
custom_proxy_group=🐟 漏网之鱼`select`[]🔗 住宅中转`[]🚀 手动选择
custom_proxy_group=🚀 手动选择`select`[]📡 中转载体`[]🇭🇰 HK`[]🇸🇬 SG`.*

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL
