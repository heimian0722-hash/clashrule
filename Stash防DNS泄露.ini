#直接粘贴机场订阅链接到url，然后导入到Stash 即可，需要开启tun模式

proxy-providers:
  机场-1:
    url: https://~~~~
    interval: 86400
  机场-2:
    url: https://~~~~
    interval: 86400

port: 7890
socks-port: 7891
allow-lan: true
external-controller: :9090

dns:
  enable: true
  prefer-h3: true
  default-nameserver:
    - 114.114.114.114
    - 119.29.29.29
  nameserver:
    - 114.114.114.114
    - 119.29.29.29
  fallback:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
  fake-ip-filter:
    [
      "*.n.n.srv.nintendo.net",
      +.stun.playstation.net,
      xbox.*.*.microsoft.com,
      "*.msftncsi.com",
      "*.msftconnecttest.com",
      WORKGROUP,
      "*.lan",
      stun.*.*,
      stun.*.*.*,
      +.stun.*.*,
      +.stun.*.*.*,
      +.stun.*.*.*.*,
      +.stun.*.*.*.*.*,
      time.windows.com,
      time.nist.gov,
      time.apple.com,
      time.asia.apple.com,
      "*.ntp.org.cn",
      "*.openwrt.pool.ntp.org",
      time1.cloud.tencent.com,
      time.ustc.edu.cn,
      pool.ntp.org,
      ntp.ubuntu.com,
      "*.*.xboxlive.com",
      speedtest.cros.wr.pvp.net,
    ]


proxy-groups:
  # 功能分组
  - name: 自动选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Auto.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    include-all: true

  - name: 手动选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Static.png
    interval: 120
    lazy: true
    type: select
    include-all: true

  - name: 选择代理
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾
      - DIRECT

  - name: 默认
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Final.png
    type: select
    proxies:
      - 选择代理
      - DIRECT


  - name: YouTube
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/YouTube.png
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾
      - DIRECT

  - name: Netflix
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Netflix.png
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾
      - DIRECT

  - name: Disney+
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Disney%2B.png
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾
      - DIRECT

  - name: Spotify
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Spotify.png
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾
      - DIRECT

  - name: Speedtest
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Speedtest.png
    type: select
    proxies:
      - 自动选择
      - 手动选择
      - US 美国
      - HK 香港
      - SG 新加坡
      - JP 日本
      - TW 台湾
      - DIRECT

  # 基于地区分组
  - name: US 美国
    filter: "美|🇺🇲|US|(?i)States|America"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png
    interval: 120
    lazy: true
    tolerance: 50
    type: select
    include-all: true

  - name: HK 香港
    filter: "澳门|🇲🇴|港|🇭🇰|HK|(?i)Hong"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
    interval: 120
    lazy: true
    tolerance: 50
    type: select
    include-all: true

  - name: JP 日本
    filter: "日|🇯🇵|东京|JP|(?i)Japan"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png
    interval: 120
    lazy: true
    tolerance: 50
    type: select
    include-all: true

  - name: SG 新加坡
    filter: "新加坡|坡|狮城|🇸🇬|SG|(?i)Singapore"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png
    interval: 120
    lazy: true
    tolerance: 50
    type: select
    include-all: true

  - name: TW 台湾
    filter: "台|🇹🇼|湾|TW|(?i)Taiwan"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Taiwan.png
    interval: 120
    lazy: true
    tolerance: 50
    type: select
    include-all: true

rule-providers:
  Custom_Direct_Domain:
    behavior: domain
    format: yaml
    url: https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml
    interval: 28800
    
  Custom_Direct_Classical_IP:
    behavior: classical
    format: yaml
    url: https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml
    interval: 28800
    
  Custom_Proxy_Domain:
    behavior: domain
    format: yaml
    url: https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml
    interval: 28800
    
  Custom_Proxy_Classical_IP:
    behavior: classical
    format: yaml
    url: https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml
    interval: 28800
    
  BankUS_Domain:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/Accademia/Additional_Rule_For_Clash/main/Bank/BankUS_Domain.yaml
    interval: 86400
    
  wificalling:
    behavior: domain
    format: yaml
    url: https://raw.githubusercontent.com/heimian0722-hash/clashrule/main/wificalling.yaml
    interval: 86400
    
  Custom_Port_Direct:
    behavior: classical
    format: yaml
    url: https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml
    interval: 28800

rules:
  - PROTOCOL,quic,REJECT
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - RULE-SET,Custom_Direct_Domain,DIRECT
  - RULE-SET,Custom_Direct_Classical_IP,DIRECT
  - RULE-SET,Custom_Proxy_Domain,手动选择
  - RULE-SET,Custom_Proxy_Classical_IP,手动选择
  - GEOSITE,cn,DIRECT
  - GEOIP,cn,DIRECT,no-resolve
  - GEOSITE,google-cn,DIRECT
  - GEOSITE,category-games@cn,DIRECT
  - GEOSITE,category-game-platforms-download,DIRECT
  - GEOSITE,category-public-tracker,DIRECT

  - GEOSITE,openai,手动选择
  - GEOSITE,category-ai-!cn,手动选择
  - RULE-SET,BankUS_Domain,手动选择
  - RULE-SET,wificalling,手动选择
  - GEOSITE,cloudflare,选择代理
  - GEOIP,cloudflare,选择代理,no-resolve
  - GEOSITE,category-communication,选择代理
  - GEOSITE,category-social-media-!cn,选择代理

  # Netflix
  - GEOSITE,netflix,Netflix
  # Disney+
  - GEOSITE,disney,Disney+
  # Spotify
  - GEOSITE,spotify,Spotify
  # Speedtest
  - GEOSITE,speedtest,Speedtest
  # GitHub
  - GEOSITE,github,选择代理
  # Telegram
  - GEOIP,telegram,选择代理,no-resolve
  - GEOSITE,telegram,选择代理
  # YouTube
  - GEOSITE,youtube,YouTube
  # Google
  - GEOSITE,google,选择代理
  - GEOIP,google,选择代理,no-resolve
  # Twitter
  - GEOSITE,twitter,选择代理
  - DOMAIN-SUFFIX,tapbots.com,选择代理
  # Instagram
  - GEOSITE,instagram,选择代理
  # Facebook
  - GEOSITE,facebook,选择代理
  # Steam
  - GEOSITE,steam,选择代理
  # Apple LBS
  - DOMAIN-SUFFIX,iphone-ld.apple.com,DIRECT
  - DOMAIN-SUFFIX,lcdn-locator.apple.com,DIRECT
  - DOMAIN-SUFFIX,lcdn-registration.apple.com,DIRECT
  - DOMAIN-SUFFIX,push.apple.com,DIRECT
  # Apple OCSP
  - PROCESS-NAME,trustd,选择代理
  # Microsoft
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,microsoft,选择代理
  - GEOIP,microsoft,选择代理,no-resolve
  - GEOSITE,xbox,选择代理
  - GEOSITE,gfw,手动选择
  - RULE-SET,Custom_Port_Direct,默认
  - MATCH,默认

mode: Rule
log-level: info
