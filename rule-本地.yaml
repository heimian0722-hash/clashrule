  proxies:  #添加节点名称  美国住宅1


proxies:   #添加节点信息 ip端口用户


# ==========================================================
# 3. 策略组 (全量重现原模板分组)
# ==========================================================
proxy-groups:
  # --- 基础组 ---
  - name: 🚀 手动选择
    type: select
    <<: *use-all
    <<: *pr

  - name: ♻️ 自动选择
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    <<: *use-all

  - name: 📡 倍率节省
    type: url-test
    filter: "(?i)(0.1x|0.01x|0.001x)"
    <<: *use-all

  - name: 🔗 住宅中转
    type: select
    proxies: [🇭🇰 HK, 🇸🇬 SG, 🇺🇸 US, 🚀 手动选择, ♻️ 自动选择, DIRECT]

  - name: 🛑 净化拦截
    type: select
    proxies: [REJECT, DIRECT, 🚀 手动选择, ♻️ 自动选择, 📡 倍率节省]

  # --- 区域组 (正则自动筛选) ---
  - name: 🇺🇸 US
    type: select
    filter: "(?i)(🇺🇸|美国|\\bUS\\b|united states|los angeles|san jose|seattle|new york)"
    <<: *use-all

  - name: 🇭🇰 HK
    type: select
    filter: "(?i)(🇭🇰|香港|\\bHK\\b|hongkong)"
    <<: *use-all

  - name: 🇸🇬 SG
    type: select
    filter: "(?i)(🇸🇬|新加坡|\\bSG\\b|singapore)"
    <<: *use-all

  - name: 🇹🇼 TW
    type: url-test
    filter: "(?i)(🇹🇼|台湾|\\bTW\\b|taiwan|taipei|hinet)"
    <<: *use-all

  - name: 🇯🇵 JP
    type: url-test
    filter: "(?i)(🇯🇵|日本|\\bJP\\b|tokyo|osaka)"
    <<: *use-all

  - name: 🧊 冷门节点
    type: select
    filter: "(?i)^(?!.*(🇭🇰|香港|🇯🇵|日本|🇹🇼|台湾|🇸🇬|新加坡|🇺🇸|美国)).*"
    <<: *use-all

  # --- 应用分流组 (全量重现原模板，均包含静态节点注入) ---
  - name: 🧠 AI
    type: select
    proxies: [🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG, 🇹🇼 TW, 🇯🇵 JP, 🧊 冷门节点, 🚀 手动选择]
    <<: *pr

  - name: 🤖 ChatGPT
    type: select
    proxies: [🇺🇸 US, 🇸🇬 SG, 🇯🇵 JP, 🚀 手动选择]
    <<: *pr

  - name: 📞 Wificalling
    type: select
    proxies: [🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG, 🚀 手动选择, DIRECT]
    <<: *pr

  - name: 🇺🇸 BankUS
    type: select
    proxies: [🇺🇸 US, 🚀 手动选择, ♻️ 自动选择, DIRECT]
    <<: *pr

  - name: 🇭🇰 BankHK
    type: select
    proxies: [🇭🇰 HK, 🇸🇬 SG, 🚀 手动选择]
    <<: *pr

  - name: 🇪🇺 BankEU
    type: select
    proxies: [🇭🇰 HK, 🇺🇸 US, 🧊 冷门节点, 🚀 手动选择]
    <<: *pr

  - name: 💰 币圈A
    type: select
    proxies: [🇺🇸 US, 🚀 手动选择]
    <<: *pr

  - name: 💰 币圈B
    type: select
    proxies: [🇭🇰 HK, 🇸🇬 SG, 🇹🇼 TW, 🚀 手动选择]
    <<: *pr

  - name: 🧑‍💻 GitHub
    type: select
    proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG, DIRECT]
    <<: *pr

  - name: 🔎 Google
    type: select
    proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG]
    <<: *pr

  - name: 🍎 Apple
    type: select
    proxies: [DIRECT, 🚀 手动选择, 🇺🇸 US, 🇭🇰 HK]
    <<: *pr

  - name: 🖥️ Microsoft
    type: select
    proxies: [DIRECT, 🚀 手动选择, 🇺🇸 US, 🇯🇵 JP]
    <<: *pr

  - name: 💬 社交媒体
    type: select
    proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG]
    <<: *pr

  - name: 📨 Telegram
    type: select
    proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG]
    <<: *pr

  - name: 🎬 YouTube
    type: select
    proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG]
    <<: *pr

  - name: 🎥 Netflix
    type: select
    proxies: [🚀 手动选择, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG]
    <<: *pr

  - name: 🎵 TikTok
    type: select
    proxies: [🚀 手动选择, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG]
    <<: *pr

  - name: 🎮 Steam
    type: select
    proxies: [DIRECT, 🚀 手动选择, 🇺🇸 US, 🇭🇰 HK]
    <<: *pr

  - name: 🌐 代理补充
    type: select
    proxies: [DIRECT, 🚀 手动选择, 🇺🇸 US, 🇭🇰 HK, 🧊 冷门节点]
    <<: *pr

  - name: 🐟 漏网之鱼
