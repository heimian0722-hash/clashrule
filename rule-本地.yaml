# 下载编辑，自行添加机场订阅链接，支持链式代理，预留静态节点，走“指定静态”组
# 本项目 链式工具.html 下载，直接浏览器打开，写的很清楚
# 注意点：一定要先添加订阅，成功运行启动代理，再编辑yaml，添加静态住宅信息

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: warning
ipv6: false
external-controller: 0.0.0.0:9090

dns:
  enable: true
  listen: 0.0.0.0:1053
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    "geosite:cn":
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "WORKGROUP"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "time.asia.apple.com"
    - "*.msftncsi.com"
    - "*.msftconnecttest.com"
    - "*.n.n.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "*.*.xboxlive.com"
    - "xbox.*.*.microsoft.com"
    - "stun.*.*"
    - "stun.*.*.*"
    - "pool.ntp.org"
    - "ntp.ubuntu.com"
    - "*.ntp.org.cn"
    - "*.openwrt.pool.ntp.org"
    - "time1.cloud.tencent.com"
    - "time.ustc.edu.cn"
    - "speedtest.cros.wr.pvp.net"


clean: &clean
  filter: "(?i)^(?!.*(流量|套餐|到期|剩余|重置|官网|网站|域名|地址|机场|入口|节点|注意|维护|失联|公告|通知|电报|群|频道|说明|最新|客服|工单|订阅|更新|失败|超时|expire|traffic|reset|remaining|official|website|telegram|tg|qq)).*$"

provider_base: &provider_base
  type: http
  interval: 3600
  health-check:
    enable: true
    url: https://www.gstatic.com/generate_204
    interval: 600

proxy-providers:
  机场1:
    <<: [*provider_base, *clean]
    url: "https://订阅1"
    path: ./proxies/yifen.yaml

  机场2:
    <<: [*provider_base, *clean]
    url: "https://订阅2"
    path: ./proxies/peiqian.yaml


proxy-providers-config:
  use-all: &use-all
    use:
      - 机场1
      - 机场2


#预留链式代理添加位置
pr: &pr
  proxies:  #添加静态节点名称 静态住宅1



proxies:    #添加静态节点信息,ip端口用户用户名密码等




