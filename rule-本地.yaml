proxy-groups:
  - name: 🚀 手动选择
    type: select
    <<: *use-all
    <<: *pr

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    <<: *use-all

  - name: 📡 倍率节省
    type: url-test
    filter: "0.1|0.01|0.001|0.05" 
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    <<: *use-all

  - name: 🛑 净化拦截
    type: select
    proxies: [REJECT, DIRECT, 🚀 手动选择, ♻️ 自动选择, 📡 倍率节省]

  - name: 🔗 住宅中转
    type: select
    proxies: [🇸🇬 SG, 🇭🇰 HK, 🇺🇸 US, 🇹🇼 TW, 🇯🇵 JP, 🚀 手动选择, ♻️ 自动选择, DIRECT]
    <<: *use-all

  - name: 指定静态
    type: select
    <<: *use-all
    <<: *pr

  - name: 🌐 代理补充
    type: select
    proxies: [♻️ 自动选择, 🚀 手动选择, 📡 倍率节省, 🇺🇸 US, 🇭🇰 HK, 🇸🇬 SG, DIRECT]
