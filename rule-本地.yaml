port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: warning
ipv6: false
external-controller: 0.0.0.0:9090

dns:
  enable: true
  listen: 0.0.0.0:1053
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    "geosite:cn":
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "WORKGROUP"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "time.asia.apple.com"
    - "*.msftncsi.com"
    - "*.msftconnecttest.com"
    - "*.n.n.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "*.*.xboxlive.com"
    - "xbox.*.*.microsoft.com"
    - "stun.*.*"
    - "stun.*.*.*"
    - "pool.ntp.org"
    - "ntp.ubuntu.com"
    - "*.ntp.org.cn"
    - "*.openwrt.pool.ntp.org"
    - "time1.cloud.tencent.com"
    - "time.ustc.edu.cn"
    - "speedtest.cros.wr.pvp.net"



